services:
  redis:
    image: crpi-ao151px1a1enkjia.cn-hangzhou.personal.cr.aliyuncs.com/wang_huui/redis:latest
    container_name: huui-game-hub-redis
    command: redis-server --appendonly yes --requirepass 123456
    volumes:
      - redis_data:/data
    restart: unless-stopped

  huui-game-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: crpi-ao151px1a1enkjia.cn-hangzhou.personal.cr.aliyuncs.com/wang_huui/game-hub:latest
    container_name: huui-game-hub
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      DATABASE_URL: sqlite:////app/data/game_hub.db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: 123456
      REDIS_DECODE_RESPONSES: "true"
      REDIS_ONLINE_USER_EXPIRE_SECONDS: 360
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1/api/game-hub/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    image: containrrr/watchtower
    container_name: huui-game-hub-watchtower
    profiles:
      - watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    command: --label-enable
    restart: unless-stopped

volumes:
  redis_data:
