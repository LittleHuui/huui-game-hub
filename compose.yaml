services:
  huui-game-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/littlehuui/huui-game-hub:latest
    container_name: huui-game-hub
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/game_hub.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1/api/game-hub/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    image: containrrr/watchtower
    container_name: huui-game-hub-watchtower
    profiles:
      - watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_CLEANUP: "true"
    command: --label-enable
    restart: unless-stopped
